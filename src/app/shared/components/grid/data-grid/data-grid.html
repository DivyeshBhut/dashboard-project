<div class="kendo-wrapper w-full h-full">
    <div *ngIf="showToolbarActions" class="grid-toolbar">
        <button
            *ngIf="showRefreshAction"
            type="button"
            class="grid-action-btn"
            aria-label="Refresh"
            (click)="refreshClick.emit()"
        >
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
            </svg>
            <span class="grid-action-tooltip">Refresh</span>
        </button>

        <button
            *ngIf="showAddAction"
            type="button"
            class="grid-action-btn"
            [attr.aria-label]="addActionLabel"
            (click)="addClick.emit()"
        >
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
            </svg>
            <span class="grid-action-tooltip">{{ addActionLabel }}</span>
        </button>

        <button
            *ngIf="showExportAction"
            type="button"
            class="grid-action-btn"
            [attr.aria-label]="exportActionLabel"
            (click)="exportClick.emit()"
        >
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V3m0 13.5 4.5-4.5M12 16.5l-4.5-4.5M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5" />
            </svg>
            <span class="grid-action-tooltip">{{ exportActionLabel }}</span>
        </button>
    </div>

    <kendo-grid 
        [data]="gridData"
        [pageSize]="pageSize"
        [skip]="skip"
        [pageable]="false"
        [sortable]="sortable"
        [filterable]="filterable"
        [selectable]="{enabled: true, checkboxOnly: true, mode: 'multiple'}"
        (pageChange)="pageChange($event)"
        class="app-grid-theme">
    
    <kendo-grid-checkbox-column [width]="80" [showSelectAll]="true"></kendo-grid-checkbox-column>

    <kendo-grid-column *ngFor="let col of columns"
        [field]="col.field" 
        [title]="col.title" 
        [width]="col.width || 150"
        [format]="col.format"
        [filterable]="col.type === 'actions' ? false : true">
          
        <!-- DATE Template -->
        <ng-template *ngIf="col.type === 'date'" kendoGridFilterCellTemplate let-filter let-column="column">
            <app-date-range-filter [filter]="filter" [field]="col.field"></app-date-range-filter>
        </ng-template>

        <!-- STATUS Template (Filter) -->
        <ng-template *ngIf="col.type === 'status'" kendoGridFilterCellTemplate let-filter let-column="column">
            <kendo-grid-string-filter-cell [column]="column" [filter]="filter" operator="startswith"></kendo-grid-string-filter-cell>
        </ng-template>
        
        <!-- STATUS Template (Cell) -->
        <ng-template *ngIf="col.type === 'status'" kendoGridCellTemplate let-dataItem>
            <span class="status-pill" 
                  [class.active]="dataItem[col.field] === true || dataItem[col.field] === 'Active'" 
                  [class.inactive]="dataItem[col.field] === false || dataItem[col.field] === 'Inactive'" 
                  [class.locked]="dataItem[col.field] === 'Locked'">
              {{
                dataItem[col.field] === true ? 'Active'
                : dataItem[col.field] === false ? 'Inactive'
                : dataItem[col.field]
              }}
            </span>
        </ng-template>

        <!-- ARRAY Template (Access Groups) -->
        <ng-template *ngIf="col.type === 'array'" kendoGridCellTemplate let-dataItem>
            <div class="group-pills-container">
                <span class="group-pill" *ngFor="let item of dataItem[col.field]">{{ item }}</span>
            </div>
        </ng-template>

        <!-- ACTIONS Template -->
        <ng-template *ngIf="col.type === 'actions'" kendoGridCellTemplate let-dataItem>
            <div class="action-icons">
                <button class="icon-btn view-icon" title="View" (click)="actionClick.emit({action: 'view', item: dataItem})">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                </button>
                <button class="icon-btn edit-icon" title="Edit" (click)="actionClick.emit({action: 'edit', item: dataItem})">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L6.832 19.82a4.5 4.5 0 01-1.89 1.13l-2.685.8.8-2.685a4.5 4.5 0 011.13-1.89l10.686-10.686z" /><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 7.125L16.875 4.5" /></svg>
                </button>
                <button class="icon-btn delete-icon" title="Delete" (click)="actionClick.emit({action: 'delete', item: dataItem})">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" /></svg>
                </button>
            </div>
        </ng-template>

    </kendo-grid-column>
    </kendo-grid>

    <!-- Custom Pagination Footer -->
    <div *ngIf="pageable && gridData.total > 0" class="custom-pagination-footer">
        <!-- Total Records on Left -->
        <div class="pagination-info">
            <span class="total-records">{{ paginationInfo }}</span>
        </div>

        <!-- Pagination Controls on Right -->
        <div class="pagination-controls">
            <!-- Previous Button -->
            <button 
                class="pagination-btn prev-btn" 
                [disabled]="currentPage === 1"
                (click)="goToPreviousPage()"
                title="Previous Page">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
                </svg>
            </button>

            <!-- Page Info -->
            <span class="page-info">Page {{ currentPage }} of {{ totalPages }}</span>

            <!-- Next Button -->
            <button 
                class="pagination-btn next-btn" 
                [disabled]="currentPage === totalPages"
                (click)="goToNextPage()"
                title="Next Page">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
                </svg>
            </button>

            <!-- Page Size Selector -->
            <div class="page-size-selector">
                <label>Show:</label>
                <div class="modern-dropdown" #dropdown>
                    <button 
                        class="dropdown-trigger" 
                        (click)="toggleDropdown($event, dropdown)"
                        type="button">
                        <span class="dropdown-value">{{ pageSize }}</span>
                        <svg class="dropdown-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
                        </svg>
                    </button>
                    <div class="dropdown-panel" [class.show]="dropdownOpen">
                        <div class="dropdown-content">
                            <div 
                                class="dropdown-option" 
                                *ngFor="let size of pageSizes"
                                [class.active]="size === pageSize"
                                (click)="selectPageSize(size, dropdown)">
                                <span class="option-text">{{ size }}</span>
                                <svg *ngIf="size === pageSize" class="check-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 6-6" />
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
