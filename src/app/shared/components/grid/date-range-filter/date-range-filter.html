<kendo-daterange>
  <div class="hidden-inputs">
    <kendo-dateinput
      kendoDateRangeStartInput
      [(value)]="start"
      [max]="today"
      (valueChange)="applyNewFilter()"
    ></kendo-dateinput>
    <kendo-dateinput
      kendoDateRangeEndInput
      [(value)]="end"
      [max]="today"
      (valueChange)="applyNewFilter(); end && popupRef?.toggle()"
    ></kendo-dateinput>
  </div>
  <button #anchor class="range-picker-trigger" (click)="popupRef?.toggle()" type="button">
    <span class="range-text">{{ formatRange() }}</span>

    <div class="range-actions">
      <svg
        *ngIf="!start && !end"
        class="range-icon"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5"
        />
      </svg>

      <div *ngIf="start || end" class="clear-icon-container" title="Clear filter" (click)="clearFilter($event, popupRef)">
        <svg
          class="range-icon clear-icon"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
          stroke="currentColor"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </div>
    </div>
  </button>
  <kendo-daterange-popup *ngIf="anchorRef" #popup [anchor]="anchorRef">
    <ng-template kendoDateRangePopupTemplate>
      <kendo-multiviewcalendar kendoDateRangeSelection [views]="1" [max]="today"></kendo-multiviewcalendar>
    </ng-template>
  </kendo-daterange-popup>
</kendo-daterange>
