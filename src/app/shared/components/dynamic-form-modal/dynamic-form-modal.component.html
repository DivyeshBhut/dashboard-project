<div class="modal-backdrop" *ngIf="isVisible" (click)="onClose()">
  <div class="modal-container" [ngClass]="containerClasses" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>{{ title }}</h3>
      <button class="close-btn" (click)="onClose()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
    
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group" 
             [class.field-full-width]="field.fullWidth" 
             *ngFor="let field of fields">
          <label>{{ field.label }}</label>

          <input *ngIf="field.type === 'text'" type="text" class="form-control" 
                 [placeholder]="field.placeholder || ''" [(ngModel)]="formData[field.key]" [disabled]="mode === 'view'">

          <input *ngIf="field.type === 'email'" type="email" class="form-control" 
                 [placeholder]="field.placeholder || ''" [(ngModel)]="formData[field.key]" [disabled]="mode === 'view'">

          <div *ngIf="field.type === 'dropdown' || field.type === 'multiselect'" class="custom-select" 
               [class.open]="openDropdownKey === field.key" [class.disabled-select]="mode === 'view'">
            <button class="select-btn" (click)="toggleDropdown($event, field.key)" [disabled]="mode === 'view'">
              <span class="selected-text">{{ field.type === 'multiselect' ? getMultiSelectText(field.key, field.placeholder) : (formData[field.key] || field.placeholder || 'Select...') }}</span>
              <svg class="select-icon" [class.rotated]="openDropdownKey === field.key" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" />
              </svg>
            </button>
            <div class="dropdown-menu" *ngIf="openDropdownKey === field.key">
              <div class="dropdown-search" (click)="$event.stopPropagation()" *ngIf="field.searchable">
                <input type="text" placeholder="Search..." (input)="onSearch($event, field.key)" [value]="searchQueries[field.key] || ''">
              </div>
              <div class="dropdown-items">
                <div class="dropdown-item" 
                     *ngFor="let option of getFilteredOptions(field)" 
                     [class.active]="field.type === 'multiselect' ? isOptionSelected(field.key, option) : option === formData[field.key]"
                     (click)="field.type === 'multiselect' ? toggleMultiSelectOption($event, field.key, option) : selectOption(field.key, option)">
                  <div style="display: flex; align-items: center; gap: 8px;">
                    <input *ngIf="field.type === 'multiselect'"
                           type="checkbox"
                           [checked]="isOptionSelected(field.key, option)"
                           style="pointer-events: none; width: 16px; height: 16px; margin: 0; accent-color: var(--accent-color);" />
                    <span class="item-text">{{ option }}</span>
                  </div>
                  <svg *ngIf="field.type !== 'multiselect' && option === formData[field.key]" class="check-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 0 1 .143 1.052l-8 10.5a.75.75 0 0 1-1.127.075l-4.5-4.5a.75.75 0 0 1 1.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 0 1 1.05-.143Z" clip-rule="evenodd" />
                  </svg>
                </div>
                <div class="dropdown-item empty-state" *ngIf="field.searchable && getFilteredOptions(field).length === 0">
                  No matches found
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-outline" (click)="onClose()">{{ mode === 'view' ? 'Close' : 'Cancel' }}</button>
      <button class="btn btn-primary" *ngIf="mode !== 'view'" (click)="onSave()">{{ saveBtnText }}</button>
    </div>
  </div>
</div>
