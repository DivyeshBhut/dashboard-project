<div class="page-container fade-in">
  <!-- Dynamic Header Row -->
  <div class="page-header">
    <!-- Breadcrumbs -->
    <div class="breadcrumb">
      <span class="breadcrumb-item">UAM</span>
      <svg class="breadcrumb-separator" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
      </svg>
      <span class="breadcrumb-item active">Permissions</span>
    </div>

    <!-- Title and Actions -->
    <div class="header-card">
      <div class="header-info">
        <h1 class="page-title">Permissions Directory</h1>
        <p class="text-muted">Manage discrete action rights and system authorizations.</p>
      </div>

      <div class="header-actions">
        <button class="btn btn-primary">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
          Add Permission
        </button>
      </div>
    </div>
  </div>

  <!-- Complete Data Table Wrapper -->
  <div class="grid-card">
    
    <!-- Attached Grid Header Toolbar -->
    <div class="grid-toolbar">
      <div class="toolbar-left">
      </div>
      <div class="toolbar-right">
        <button class="btn btn-outline btn-refresh">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
          </svg>
          Refresh
        </button>
      </div>
    </div>

    <!-- The Shared Data Grid -->
    <div class="table-responsive">
      <app-data-grid 
          [data]="permissionsData" 
          [columns]="gridColumns" 
          [pageSize]="pageSize"
          (actionClick)="handleAction($event)">
      </app-data-grid>
    </div>
  </div>
</div>
