<!-- Page Header Section -->
<div class="page-header">
  <div class="breadcrumb">
    <span class="breadcrumb-item">UAM</span>
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="breadcrumb-separator">
      <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
    </svg>
    <span class="breadcrumb-item active">Users</span>
  </div>
  
  <div class="header-card">
    <div class="header-info">
      <h2 class="page-title">User Management</h2>
      <p class="text-muted">Manage system access, roles, and user profiles across the enterprise.</p>
    </div>
    <div class="header-actions">
      <button class="btn btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
        </svg>
        Add User
      </button>
      <button class="btn btn-secondary">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        Verify Data
      </button>
      <button class="btn btn-outline">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
        </svg>
        Export All
      </button>
    </div>
  </div>
</div>

<!-- Complete Data Table Wrapper -->
<div class="grid-card">
  
  <!-- Attached Grid Header Toolbar -->
  <div class="grid-toolbar">
    <div class="toolbar-left">
      <!-- Optional left side filter elements -->
    </div>
    <div class="toolbar-right">
      <button class="btn btn-outline btn-refresh">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
        </svg>
        Refresh
      </button>
    </div>
  </div>

  <!-- The Shared Data Grid -->
  <div class="table-responsive">
    <app-data-grid 
        [data]="users" 
        [columns]="gridColumns" 
        [pageSize]="pageSize"
        (actionClick)="handleAction($event)">
    </app-data-grid>
  </div>
</div>
