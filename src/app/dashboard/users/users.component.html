<!-- Page Header Section -->
<div class="page-header">
  <div class="breadcrumb">
    <span class="breadcrumb-item">UAM</span>
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="breadcrumb-separator">
      <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
    </svg>
    <span class="breadcrumb-item active">Users</span>
  </div>
  
  <div class="header-card">
    <div class="header-info">
      <h2 class="page-title">User Management</h2>
      <p class="text-muted">Manage system access, roles, and user profiles across the enterprise.</p>
    </div>
    <div class="header-actions">
      <button class="btn btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
        </svg>
        Add User
      </button>
      <button class="btn btn-secondary">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        Verify Data
      </button>
      <button class="btn btn-outline">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
        </svg>
        Export All
      </button>
    </div>
  </div>
</div>

<!-- Complete Data Table Wrapper -->
<div class="grid-card">
  
  <!-- Attached Grid Header Toolbar -->
  <div class="grid-toolbar">
    <div class="toolbar-left">
      <!-- Optional left side filter elements -->
    </div>
    <div class="toolbar-right">
      <div class="filter-group">
        <select class="form-select">
          <option>Filter by Group</option>
          <option>System Admin</option>
          <option>Auditor</option>
          <option>Compliance Officer</option>
        </select>
      </div>
      <button class="btn btn-outline btn-refresh">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
        </svg>
        Refresh
      </button>
    </div>
  </div>

  <!-- The Kendo Table -->
  <div class="table-responsive kendo-wrapper">
    <kendo-grid 
        [kendoGridBinding]="users"
        [pageSize]="10"
        [pageable]="true"
        [sortable]="true"
        [filterable]="true">
        
      <kendo-grid-checkbox-column [width]="50"></kendo-grid-checkbox-column>
      
      <kendo-grid-column field="username" title="Username" [width]="200"></kendo-grid-column>
      <kendo-grid-column field="email" title="Email" [width]="250"></kendo-grid-column>
      <kendo-grid-column field="accessGroup" title="Access Group" [width]="200"></kendo-grid-column>
      
      <kendo-grid-column field="status" title="Status" [width]="150">
        <ng-template kendoGridCellTemplate let-dataItem>
          <span class="status-pill" 
                [class.active]="dataItem.status === 'Active'" 
                [class.inactive]="dataItem.status === 'Inactive'" 
                [class.locked]="dataItem.status === 'Locked'">
            {{ dataItem.status }}
          </span>
        </ng-template>
      </kendo-grid-column>
      
      <kendo-grid-column field="createdDate" title="Created Date" [width]="150"></kendo-grid-column>
      
      <kendo-grid-column title="Actions" [width]="150" [filterable]="false">
        <ng-template kendoGridCellTemplate let-dataItem>
          <div class="action-icons">
              <button class="icon-btn" title="View">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
              </button>
              <button class="icon-btn edit-icon" title="Edit">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L6.832 19.82a4.5 4.5 0 01-1.89 1.13l-2.685.8.8-2.685a4.5 4.5 0 011.13-1.89l10.686-10.686z" /><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 7.125L16.875 4.5" /></svg>
              </button>
              <button class="icon-btn delete-icon" title="Delete">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" /></svg>
              </button>
          </div>
        </ng-template>
      </kendo-grid-column>
    </kendo-grid>
  </div>
</div>
