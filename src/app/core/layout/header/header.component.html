<header class="topbar">
  <div class="topbar-shell">
    <div class="page-title">
      <h2>{{ pageTitle }}</h2>
    </div>
    <div class="topbar-actions">
      <div class="profile-menu-container">
        <button
          class="user-profile profile-trigger"
          type="button"
          [class.open]="isProfileMenuOpen"
          (click)="toggleProfileMenu($event)"
          aria-haspopup="menu"
          [attr.aria-expanded]="isProfileMenuOpen"
        >
          <div class="avatar">A</div>
          <span class="user-name">{{ userName }}</span>
          <svg class="caret" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
          </svg>
        </button>

        <div *ngIf="isProfileMenuOpen" class="profile-dropdown" role="menu">
          <div class="profile-info">
            <p class="profile-name">{{ userName }}</p>
            <p class="profile-email">{{ userEmail }}</p>
          </div>

          <div class="menu-section">
            <p class="section-label">Theme setting</p>
            <div class="theme-switch" role="group" aria-label="Theme mode">
              <button
                type="button"
                class="theme-option"
                [class.active]="!isDarkMode"
                (click)="setTheme('light')"
              >
                Light
              </button>
              <button
                type="button"
                class="theme-option"
                [class.active]="isDarkMode"
                (click)="setTheme('dark')"
              >
                Dark
              </button>
            </div>
          </div>

          <button class="logout-btn" type="button" (click)="logout()">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" />
            </svg>
            <span>Logout</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</header>
