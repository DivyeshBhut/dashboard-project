<aside class="sidebar" [class.collapsed]="!isSidebarOpen">
  <div class="sidebar-header">
    <div class="brand">
      <svg class="brand-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <rect x="3" y="3" width="18" height="18" rx="4" fill="#3b82f6" />
        <rect x="7" y="10" width="2" height="7" rx="1" fill="white" />
        <rect x="11" y="7" width="2" height="10" rx="1" fill="white" />
        <rect x="15" y="12" width="2" height="5" rx="1" fill="white" />
      </svg>
      <span class="brand-text">TrackWizz</span>
    </div>
    <button class="toggle-btn" (click)="toggleSidebar()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
      </svg>
    </button>
  </div>

  <nav class="sidebar-nav">
    <div class="menu-label">MENU</div>

    <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item">
      <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" />
      </svg>
      <span>Dashboard</span>
    </a>

    <!-- UAM Section -->
    <div class="nav-group">
      <button class="nav-item group-toggle" (click)="onGroupClick('uam', '/dashboard/users')" [class.open]="uamOpen">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z" />
        </svg>
        <span class="group-title">UAM</span>
        <svg class="chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
        </svg>
      </button>
      <div class="sub-nav" [class.expanded]="uamOpen">
        <div class="sub-nav-inner">
          <a routerLink="/dashboard/users" routerLinkActive="active" (click)="navigateTo('/dashboard/users')" class="sub-nav-item">Users</a>
          <a routerLink="/dashboard/groups" routerLinkActive="active" (click)="navigateTo('/dashboard/groups')" class="sub-nav-item">Groups</a>
          <a routerLink="/dashboard/permissions" routerLinkActive="active" (click)="navigateTo('/dashboard/permissions')" class="sub-nav-item">Permissions</a>
        </div>
      </div>
    </div>

    <!-- Project Hub Section -->
    <div class="nav-group">
      <button class="nav-item group-toggle" (click)="onGroupClick('projectHub', '/dashboard/screenza-matrix')" [class.open]="projectHubOpen">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.59 14.37a6 6 0 01-5.84 7.38v-4.8m5.84-2.58a14.98 14.98 0 006.16-12.12A14.98 14.98 0 009.631 8.41m5.96 5.96a14.926 14.926 0 01-5.841 2.58m-.119-8.54a6 6 0 00-7.381 5.84h4.8m2.581-5.84a14.927 14.927 0 00-2.58 5.84m2.699 2.7c-.103.021-.207.041-.311.06a15.09 15.09 0 01-2.448-2.45m.001 0c-.019-.104-.039-.208-.06-.311m-2.45 2.45a5.955 5.955 0 00-1.87 3.39" />
        </svg>
        <span class="group-title">Project Hub</span>
        <svg class="chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
        </svg>
      </button>
      <div class="sub-nav" [class.expanded]="projectHubOpen">
        <div class="sub-nav-inner">
          <a routerLink="/dashboard/screenza-matrix" routerLinkActive="active" (click)="navigateTo('/dashboard/screenza-matrix')" class="sub-nav-item">Screenza Matrix</a>
        </div>
      </div>
    </div>

    <!-- Master Data Section -->
    <div class="nav-group">
      <button class="nav-item group-toggle" (click)="onGroupClick('masterData', '/dashboard/test-case-runs')" [class.open]="masterDataOpen">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 6.375c0 2.278-3.694 4.125-8.25 4.125S3.75 8.653 3.75 6.375m16.5 0c0-2.278-3.694-4.125-8.25-4.125S3.75 4.097 3.75 6.375m16.5 0v11.25c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125V6.375m16.5 0v3.75m-16.5-3.75v3.75m16.5 0v3.75C20.25 16.153 16.556 18 12 18s-8.25-1.847-8.25-4.125v-3.75m16.5 0c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125" />
        </svg>
        <span class="group-title">Master Data</span>
        <svg class="chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
        </svg>
      </button>
      <div class="sub-nav" [class.expanded]="masterDataOpen">
        <div class="sub-nav-inner">
          <a routerLink="/dashboard/test-case-runs" routerLinkActive="active" (click)="navigateTo('/dashboard/test-case-runs')" class="sub-nav-item">Test case runs</a>

          <!-- Nested Pipeline Executions Section -->
          <div class="nested-group">
            <button class="sub-nav-item group-toggle" (click)="onNestedGroupClick($event, 'pipelineExecutions', '/dashboard/pipeline-executions/dashboard')" [class.open]="pipelineExecutionsOpen">
              <span class="group-title">Pipeline Executions</span>
              <svg class="chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
              </svg>
            </button>
            <div class="nested-sub-nav" [class.expanded]="pipelineExecutionsOpen">
              <a routerLink="/dashboard/pipeline-executions/dashboard" routerLinkActive="active" (click)="navigateTo('/dashboard/pipeline-executions/dashboard')" class="sub-nav-item nested-item">Dashboard</a>
              <a routerLink="/dashboard/pipeline-executions/pipelines" routerLinkActive="active" (click)="navigateTo('/dashboard/pipeline-executions/pipelines')" class="sub-nav-item nested-item">Pipelines</a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Security Section -->
    <div class="nav-group">
      <button class="nav-item group-toggle" (click)="onGroupClick('security', '/dashboard/audit-logs')" [class.open]="securityOpen">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
        </svg>
        <span class="group-title">Security</span>
        <svg class="chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
        </svg>
      </button>
      <div class="sub-nav" [class.expanded]="securityOpen">
        <div class="sub-nav-inner">
          <a routerLink="/dashboard/audit-logs" routerLinkActive="active" (click)="navigateTo('/dashboard/audit-logs')" class="sub-nav-item">Audit logs</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="sidebar-footer">
    <a routerLink="/dashboard/settings" routerLinkActive="active" (click)="navigateTo('/dashboard/settings')" class="nav-item">
      <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z" />
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
      <span>Settings</span>
    </a>
  </div>
</aside>
