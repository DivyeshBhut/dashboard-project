<div class="page-container fade-in">
  <!-- Breadcrumbs -->
  <div class="page-header">
    <div class="breadcrumb">
      <span class="breadcrumb-item">UAM</span>
      <svg class="breadcrumb-separator" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
      </svg>
      <span class="breadcrumb-item active">Groups</span>
    </div>

    <!-- Title and Actions -->
    <div class="header-card">
      <div class="header-info">
        <h1 class="page-title">Access Groups</h1>
        <p class="text-muted">Manage system permissions and role-based access control.</p>
      </div>
      <div class="header-actions">
        <div class="global-search">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-4.35-4.35m0 0A7.5 7.5 0 1 0 6.04 6.04a7.5 7.5 0 0 0 10.61 10.61Z" />
          </svg>
          <input
            type="text"
            class="global-search-input"
            placeholder="Search groups, permissions, status..."
            [(ngModel)]="globalSearchTerm"
          />
        </div>
      </div>
    </div>
  </div>

  <!-- Grid -->
  <div class="grid-card">
    <div class="table-responsive">
      <app-data-grid
        [data]="filteredGroupsData"
        [columns]="gridColumns"
        [pageSize]="pageSize"
        [addActionLabel]="'Add Group'"
        [exportActionLabel]="'Export Groups'"
        (refreshClick)="onRefreshGrid()"
        (addClick)="onAddGroup()"
        (exportClick)="onExportGrid()"
        (actionClick)="handleAction($event)">
      </app-data-grid>
    </div>
  </div>
</div>

<app-dynamic-form-modal
  [isVisible]="isGroupModalOpen"
  [layout]="'single'"
  [mode]="modalMode"
  [titleAdd]="'Add New Group'"
  [titleEdit]="'Edit Group'"
  [titleView]="'View Group Details'"
  [saveBtnTextAdd]="'Save Group'"
  [saveBtnTextEdit]="'Update Group'"
  [fields]="groupFormFields"
  [formData]="currentEditGroup"
  (save)="onSaveGroup($event)"
  (close)="closeGroupModal()">
</app-dynamic-form-modal>
