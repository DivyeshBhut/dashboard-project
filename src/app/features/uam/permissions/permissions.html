<div class="page-container fade-in">
  <!-- Dynamic Header Row -->
  <div class="page-header">
    <!-- Breadcrumbs -->
    <div class="breadcrumb">
      <span class="breadcrumb-item">UAM</span>
      <svg class="breadcrumb-separator" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
      </svg>
      <span class="breadcrumb-item active">Permissions</span>
    </div>

    <!-- Title and Actions -->
    <div class="header-card">
      <div class="header-info">
        <h1 class="page-title">Permissions Directory</h1>
        <p class="text-muted">Manage discrete action rights and system authorizations.</p>
      </div>

      <div class="header-actions">
        <div class="global-search">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-4.35-4.35m0 0A7.5 7.5 0 1 0 6.04 6.04a7.5 7.5 0 0 0 10.61 10.61Z" />
          </svg>
          <input
            type="text"
            class="global-search-input"
            placeholder="Search permission, users, dates..."
            [(ngModel)]="globalSearchTerm"
          />
        </div>
      </div>
    </div>
  </div>

  <!-- Complete Data Table Wrapper -->
  <div class="grid-card">
    <!-- The Shared Data Grid -->
    <div class="table-responsive">
      <app-data-grid 
          [data]="filteredPermissionsData" 
          [columns]="gridColumns" 
          [pageSize]="pageSize"
          [addActionLabel]="'Add Permission'"
          [exportActionLabel]="'Export Permissions'"
          (refreshClick)="onRefreshGrid()"
          (addClick)="onAddPermission()"
          (exportClick)="onExportGrid()"
          (actionClick)="handleAction($event)">
      </app-data-grid>
    </div>
  </div>
</div>
