<!-- Page Header Section -->
<div class="page-header">
  <div class="breadcrumb">
    <span class="breadcrumb-item">UAM</span>
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="breadcrumb-separator">
      <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
    </svg>
    <span class="breadcrumb-item active">Users</span>
  </div>
  
  <div class="header-card">
    <div class="header-info">
      <h2 class="page-title">User Management</h2>
      <p class="text-muted">Manage system access, roles, and user profiles across the enterprise.</p>
    </div>
    <div class="header-actions">
      <div class="global-search">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-4.35-4.35m0 0A7.5 7.5 0 1 0 6.04 6.04a7.5 7.5 0 0 0 10.61 10.61Z" />
        </svg>
        <input
          type="text"
          class="global-search-input"
          placeholder="Search users, email, groups, status..."
          [(ngModel)]="globalSearchTerm"
        />
      </div>
    </div>
  </div>
</div>

<!-- Complete Data Table Wrapper -->
<div class="grid-card">
  <!-- The Shared Data Grid -->
  <div class="table-responsive">
    <app-data-grid 
        [data]="filteredUsers" 
        [columns]="gridColumns" 
        [pageSize]="pageSize"
        [addActionLabel]="'Add User'"
        [exportActionLabel]="'Export Users'"
        (refreshClick)="onRefreshGrid()"
        (addClick)="openUserModal()"
        (exportClick)="onExportGrid()"
        (actionClick)="handleAction($event)">
    </app-data-grid>
  </div>
</div>

<app-dynamic-form-modal
  [isVisible]="isUserModalOpen"
  [layout]="'single'"
  [mode]="modalMode"
  [titleAdd]="'Add New User'"
  [titleEdit]="'Edit User'"
  [titleView]="'View User Details'"
  [saveBtnTextAdd]="'Save User'"
  [saveBtnTextEdit]="'Update User'"
  [fields]="userFormFields"
  [formData]="currentEditUser"
  (save)="onSaveUser($event)"
  (close)="closeUserModal()">
</app-dynamic-form-modal>
